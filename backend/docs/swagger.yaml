basePath: /
definitions:
  backend_internal_domain.Subscription:
    properties:
      end_date:
        type: string
      id:
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    type: object
  gin.H:
    additionalProperties: {}
    type: object
  internal_handler.CreateSubscriptionRequest:
    properties:
      end_date:
        $ref: '#/definitions/internal_handler.MonthYearDate'
      price:
        type: integer
      service_name:
        type: string
      start_date:
        $ref: '#/definitions/internal_handler.MonthYearDate'
      user_id:
        type: string
    required:
    - price
    - service_name
    - start_date
    - user_id
    type: object
  internal_handler.MonthYearDate:
    properties:
      time.Time:
        type: string
    type: object
  internal_handler.UpdateSubscriptionBody:
    properties:
      end_date:
        $ref: '#/definitions/internal_handler.MonthYearDate'
      price:
        type: integer
      service_name:
        type: string
      start_date:
        $ref: '#/definitions/internal_handler.MonthYearDate'
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing user online subscriptions
  title: Subscription Manager API
  version: "1.0"
paths:
  /api/calculate_total_price:
    get:
      description: Calculate total cost of all subscriptions for a selected period
        with optional filters
      parameters:
      - description: Period start (MM-YYYY)
        in: query
        name: period_start
        required: true
        type: string
      - description: Period end (MM-YYYY)
        in: query
        name: period_end
        required: true
        type: string
      - description: User ID filter
        in: query
        name: user_id
        type: string
      - description: Service name filter
        in: query
        name: service_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin.H'
            - properties:
                total_price:
                  type: integer
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Calculate total price
      tags:
      - subscriptions
  /api/subscriptions:
    get:
      description: Get all subscriptions with optional user_id filter
      parameters:
      - description: User ID filter
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin.H'
            - properties:
                subscriptions:
                  items:
                    $ref: '#/definitions/backend_internal_domain.Subscription'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: List all subscriptions
      tags:
      - subscriptions
    post:
      consumes:
      - application/json
      description: Create a new subscription record for a user
      parameters:
      - description: Subscription data
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/backend_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Create a new subscription
      tags:
      - subscriptions
  /api/subscriptions/{id}:
    delete:
      description: Delete a subscription record by its ID
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Delete a subscription
      tags:
      - subscriptions
    get:
      description: Get a subscription record by its ID
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Get a subscription by ID
      tags:
      - subscriptions
    put:
      consumes:
      - application/json
      description: Update an existing subscription record
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated subscription data
        in: body
        name: subscription
        schema:
          $ref: '#/definitions/internal_handler.UpdateSubscriptionBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Update a subscription
      tags:
      - subscriptions
swagger: "2.0"
